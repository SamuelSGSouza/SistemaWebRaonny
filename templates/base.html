<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>CRM Pro - Dashboard</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        /* Sidebar Customization */
        .sidebar {
            min-height: 100vh;
            background: #ffffff;
            border-right: 1px solid #dee2e6;
            transition: all 0.3s;
        }

        .nav-link {
            color: #495057;
            font-weight: 500;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            margin: 0.2rem 1rem;
        }

        .nav-link:hover {
            background-color: #f1f3f5;
            color: #007bff;
        }

        .nav-link.active {
            background-color: #e7f1ff;
            color: #007bff !important;
        }

        .nav-link i {
            width: 25px;
            margin-right: 10px;
        }

        .sidebar-brand {
            padding: 1.5rem;
            font-weight: 700;
            color: #007bff;
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .user-profile-section {
            border-top: 1px solid #dee2e6;
            padding: 1.5rem 1rem;
            margin-top: auto;
        }

        .avatar-circle {
            width: 40px;
            height: 40px;
            background-color: #007bff;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
        }

        .logout-btn {
            border: none;
            background: transparent;
            color: #dc3545;
            padding: 0;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            text-decoration: underline;
        }
    </style>
    <style>
        /* Estilização básica do Select2 */
.select2-container--default .select2-selection--single {
    height: 38px;
    padding: 6px 12px;
    border: 1px solid #ced4da;
    border-radius: 0.25rem;
}

.select2-container--default .select2-selection--single .select2-selection__arrow {
    height: 36px;
}

.select2-container--default .select2-results__option--highlighted[aria-selected] {
    background-color: #007bff;
    color: white;
}
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-0 shadow-sm">
            <div class="sidebar-sticky d-flex flex-column h-100">
                
                <div class="sidebar-brand d-flex align-items-center">
                    <i class="fas fa-chart-line mr-2"></i>
                    <span>CRM Pro</span>
                </div>

                <ul class="nav flex-column mb-auto">
                    <li class="nav-item">
                        <a class="nav-link {{home_active}}" href="{% url 'home' %}">
                            <i class="fas fa-home"></i> Dashboard
                        </a>
                    </li>
                    
                    {% if request.user.is_staff %}
                    <li class="nav-item">
                        <a class="nav-link {{usuarios_active}}" href="{% url 'usuarios' %}">
                            <i class="fas fa-users"></i> Usuários
                        </a>
                    </li>
                    {% endif %}

                    <li class="nav-item">
                        <a class="nav-link {{propostas_active}}" href="{% url 'propostas' %}">
                            <i class="fas fa-file-contract"></i> Propostas
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link {{clientes_active}}" href="{% url 'clientes' %}">
                            <i class="fas fa-user"></i> Clientes
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link {{servicos_active}}" href="{% url 'servicos' %}">
                            <i class="fas fa-file-invoice"></i> Serviços
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{modelos_active}}" href="{% url 'modelos' %}">
                            <i class="fas fa-database"></i> Modelos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{api_active}}" href="{% url 'api_doc' %}">
                            <i class="fas fa-book"></i> API
                        </a>
                    </li>
                </ul>

                <div class="user-profile-section">
                    <div class="d-flex align-items-center mb-3">
                        <div class="avatar-circle mr-3">{{request.session.sigla}}</div>
                        <div class="overflow-hidden">
                            <h6 class="mb-0 text-truncate">{{request.user.first_name}}</h6>
                            <small class="text-muted">{{request.session.cargo}}</small>
                        </div>
                    </div>
                    
                    <form method="post" action="{% url 'logout' %}" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="logout-btn">
                            <i class="fas fa-sign-out-alt mr-1"></i> Sair do sistema
                        </button>
                    </form>
                </div>
            </div>
        </nav>

        <main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-md-4 py-4">
            {% block page_body %}
            {% endblock %}
        </main>
    </div>
</div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
